<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Agent Script Flow</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <h1>Agent Script Flow</h1>
    <p>Select Call Type</p>
</header>

<main>

    <div class="call-types">
        <button onclick="showScript('buyer')">Buyer</button>
        <button onclick="showScript('seller')">Seller</button>
        <button onclick="showScript('investor')">Investor</button>
        <button onclick="showScript('expired')">Expired</button>
        <button onclick="showScript('fsbo')">FSBO</button>
        <button onclick="showScript('referral')">Referral</button>
        <button onclick="showScript('openhouse')">Open House</button>
    </div>

    <div id="scriptContainer" class="script-container">
        <p class="placeholder">Choose a call type to load your script.</p>
    </div>

</main>

<script src="script.js"></script>
</body>
</html>
